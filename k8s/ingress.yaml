apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: forkful-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: forkful.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: forkful-service
                port:
                  number: 80
