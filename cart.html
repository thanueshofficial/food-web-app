<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Cart — Forkful</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="cart">

<header class="nav">
  <div class="nav-inner">
    <a href="index.html" class="brand"><span class="brand-mark">Fork</span>ful</a>
    <nav class="nav-links">
      <a href="index.html" data-nav="home"><span class="link-text">Home</span></a>
      <a href="menu.html" data-nav="menu"><span class="link-text">Menu</span></a>
      <a href="cart.html" data-nav="cart" class="cart-pill">
        Cart <span class="cart-count" data-cart-count>0</span>
      </a>
    </nav>
  </div>
</header>

<main>
  <section class="section">
    <div class="section-head">
      <div>
        <span class="section-eyebrow">Before you check out</span>
        <h2>Your cart</h2>
      </div>
      <a href="menu.html" class="btn btn-ghost" style="color:var(--charcoal); border-color:var(--line-dark);">← Add more items</a>
    </div>

    <div class="cart-layout">
      <div>
        <div class="cart-list" id="cart-list"></div>
        <div class="empty-state" id="cart-empty">
          <h2>Your cart is empty</h2>
          <p>Looks like you haven't picked anything from the pass yet.</p>
          <a href="menu.html" class="btn btn-primary">Browse the menu</a>
        </div>
      </div>

      <aside class="summary-card" id="cart-summary">
        <h2>Order summary</h2>
        <div id="summary-lines"></div>
        <a href="billing.html" class="btn btn-primary" style="width:100%; margin-top:20px;">Proceed to checkout</a>
      </aside>
    </div>
  </section>
</main>

<footer class="site-footer">
  Forkful · demo food-ordering app · built for portfolio &amp; learning purposes
</footer>

<script src="assets/js/app.js"></script>
<script>
  renderCartPage();
</script>
</body>
</html>
